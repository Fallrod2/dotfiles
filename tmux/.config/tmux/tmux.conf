# ~/.config/tmux/tmux.conf

# ── Terminal & couleurs ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# CRITIQUE pour nvim : transmet les événements de focus
# (ton autoread/autosave mvim dépend de FocusGained/FocusLost)
set -g focus-events on

# Réactivité de la touche Esc (nvim)
set -sg escape-time 10

# ── Prefix ───────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# ── Fenêtres & panes ─────────────────────────────────────────────────
set -g base-index 1           # fenêtres numérotées depuis 1 (touche accessible)
setw -g pane-base-index 1     # pareil pour les panes
set -g renumber-windows on    # ferme la fenêtre 2 → la 3 devient 2 (pas de trous)

# Splits : | vertical, - horizontal, DANS le dossier courant
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Resize répétable (-r : pas besoin de retaper le prefix entre deux coups)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z     # zoom/dézoom du pane courant

# ── Confort ──────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000    # scrollback digne de ce nom (logs d'agents...)
set -g detach-on-destroy off  # tuer une session → bascule sur la suivante au lieu de détacher

# Recharger la config (nouveau chemin !)
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config rechargée"

# ── Copy-mode vi ─────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Plugins (TPM) ────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'   # C-hjkl unifié nvim<->tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'      # sauvegarde/restauration des sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # sauvegarde auto toutes les 15 min
set -g @plugin 'fabioluciano/tmux-tokyo-night'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# TPM — toujours en dernière ligne
run '~/.tmux/plugins/tpm/tpm'
